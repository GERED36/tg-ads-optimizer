version: "3.8"

services:
  agent:
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/app/prisma
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  sqlite_data:
