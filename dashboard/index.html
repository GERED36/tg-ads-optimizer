<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Маркетинговый агент</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0f0f11;
      --bg-card: #1a1a1e;
      --bg-elevated: #252529;
      --border: #2a2a2e;
      --text-primary: #e1e1e6;
      --text-secondary: #888;
      --text-muted: #666;
      --accent-primary: #6c8cff;
      --accent-secondary: #4caf50;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 2px 8px rgba(0,0,0,.3);
      --shadow-lg: 0 4px 16px rgba(0,0,0,.4);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: .2s ease;
    }
    [data-theme="blue-purple"] { --accent-primary: #5b7dff; --accent-secondary: #9c27b0; }
    [data-theme="green-orange"] { --accent-primary: #4caf50; --accent-secondary: #ff9800; }
    [data-theme="rose-amber"] { --accent-primary: #e91e63; --accent-secondary: #ffc107; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50% { opacity: .7; }
    }
    .skeleton {
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s infinite;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn .3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
